server.port=8081

# Database
spring.datasource.url=jdbc:mysql://localhost:3306/resume_analyzer?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:dilip1523}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.open-in-view=false
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect

# JWT
app.jwt.secret=${JWT_SECRET:ResumeAnalyzerSecretKey2024SuperLongKeyForSecurity}
app.jwt.expiration-ms=86400000

# File upload
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB
app.upload.dir=uploads/resumes

# ── Groq AI API (FREE) ──────────────────────────────────────────────────────
# 1. Sign up at https://console.groq.com (free, no credit card required)
# 2. Create an API key
# 3. Paste it here OR set environment variable GROQ_API_KEY
# Without this key, the chatbot uses rule-based responses (still helpful!)
app.groq.api-key={Grok_Api_Key}

# ── Email (Gmail SMTP - optional) ────────────────────────────────────────────
# Get app password: Google Account -> Security -> App Passwords
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${MAIL_USERNAME:your-email@gmail.com}
spring.mail.password=${MAIL_PASSWORD:your-app-password}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.connectiontimeout=5000
spring.mail.properties.mail.smtp.timeout=5000

app.frontend.url=http://localhost:5174
